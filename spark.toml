[module]
name = "spark-telegram-bot"
version = "1.0.0"
kind = "service"
plane = "ingress"
description = "Spark Telegram ingress gateway for Builder and Spawner"
homepage = "https://github.com/spark/spark-telegram-bot"
license = "ISC"

[runtime]
kind = "node"
version = ">=22"
package_manager = "npm"
lockfile = "package-lock.json"

[install.dev]
commands = ["npm ci"]

[provides]
capabilities = [
  "telegram.ingress",
  "telegram.reply",
  "telegram.mission-control",
]

[needs]
modules = ["spark-intelligence-builder", "spawner-ui"]
capabilities = ["spark.runtime", "mission.execution"]
secrets = [
  "telegram.bot_token",
  "telegram.admin_ids",
  "telegram.relay_secret",
  "llm.zai.api_key",
  "llm.openai.api_key",
  "llm.anthropic.api_key",
]

[claims]
secrets = [
  "telegram.bot_token",
  "telegram.relay_secret",
  "llm.zai.api_key",
  "llm.openai.api_key",
  "llm.anthropic.api_key",
]
ports = [8788]
routes = ["http.spawner-events"]

[secrets.telegram_bot_token]
prompt = "Telegram bot token from @BotFather"
required = true
storage = "keychain"
env_var = "BOT_TOKEN"

[secrets.telegram_admin_ids]
prompt = "Comma-separated Telegram admin IDs allowed to run orchestration commands"
required = true
storage = "file"
env_var = "ADMIN_TELEGRAM_IDS"

[secrets.telegram_relay_secret]
prompt = "Local Spawner-to-Telegram relay secret"
required = false
storage = "keychain"
env_var = "TELEGRAM_RELAY_SECRET"

[secrets.llm_zai_api_key]
prompt = "Z.AI API key for GLM coding endpoint"
required = false
storage = "keychain"
env_var = "ZAI_API_KEY"

[secrets.llm_openai_api_key]
prompt = "OpenAI API key for Spark LLM gateway"
required = false
storage = "keychain"
env_var = "OPENAI_API_KEY"

[secrets.llm_anthropic_api_key]
prompt = "Anthropic API key for Spark LLM gateway"
required = false
storage = "keychain"
env_var = "ANTHROPIC_API_KEY"

[run.default]
command = "npm run dev"
cwd = "."
ready_check = "npm run health:polling"
post_ready_watch_seconds = 20

[healthcheck]
command = "npm run health:polling"
timeout_seconds = 20
success_hint = "Telegram long-polling ingress owner is configured."
failure_hint = "Run `npm run health:polling` in the module home for the repair detail."

[config]
format = "env"
output = ".env"
installer_owned = true

[paths]
home = "~/.spark/modules/spark-telegram-bot"
state = "~/.spark/state/spark-telegram-bot"
logs = "~/.spark/logs/spark-telegram-bot"

[profiles.telegram_starter]
role = "telegram-ingress-owner"
owns = [
  "telegram.ingress",
  "telegram.reply",
  "telegram.bot_token",
]
depends_on = [
  "spark-intelligence-builder",
  "spawner-ui",
]
